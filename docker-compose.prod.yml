# Host deployment for sendmemes-discord-bot.
#
# Pulls the image published by .github/workflows/docker-image.yml and connects
# to existing shared infrastructure (PostgreSQL) over the external `shared_net`
# network — this file does NOT run its own database.
#
# Prerequisites on the host:
#   - `shared_net` network exists:  docker network create shared_net
#   - a PostgreSQL service is reachable as `postgres:5432` on that network
#   - the target database (POSTGRES_DB, default `sendmemes`) already exists
#     (the app auto-creates its TABLES via the migrate build tag, but not the
#      database itself)
#   - a `.env` file next to this compose supplies the values below
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: aaron850130/sendmemes-discord-bot:latest
    container_name: sendmemes-discord-bot
    ports:
      - "8090:8080"
    environment:
      # App
      APP_NAME: sendmemes-discord-bot
      APP_VERSION: "1.0.0"
      # HTTP
      HTTP_PORT: "8080"
      HTTP_USE_PREFORK_MODE: "false"
      HTTP_PUBLIC_URL: ${HTTP_PUBLIC_URL:-http://localhost:8090}
      # Logger
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Database (shared postgres on shared_net)
      PG_POOL_MAX: ${PG_POOL_MAX:-2}
      PG_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sendmemes}?sslmode=disable
      # Admin API / UI sign-in
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      # Discord
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      DISCORD_NOTIFY_CHANNEL_ID: ${DISCORD_NOTIFY_CHANNEL_ID}
      DISCORD_SEND_INTERVAL: ${DISCORD_SEND_INTERVAL:-6h}
      DISCORD_SEND_HISTORY_SIZE: ${DISCORD_SEND_HISTORY_SIZE:-10}
      DISCORD_VERBOSE_LOG: ${DISCORD_VERBOSE_LOG:-true}
      ALBUM_DEFAULT_SEND_MODE: ${ALBUM_DEFAULT_SEND_MODE:-Random}
      # pCloud
      PCLOUD_ACCESS_TOKEN: ${PCLOUD_ACCESS_TOKEN}
      PCLOUD_TOKEN_TYPE: ${PCLOUD_TOKEN_TYPE:-session}
      PCLOUD_USERNAME: ${PCLOUD_USERNAME}
      PCLOUD_PASSWORD: ${PCLOUD_PASSWORD}
      CLOUD_MAIN_FOLDER_ID: ${CLOUD_MAIN_FOLDER_ID}
      PCLOUD_API_ENDPOINT: ${PCLOUD_API_ENDPOINT:-https://api.pcloud.com}
      PCLOUD_SYNC_INTERVAL: ${PCLOUD_SYNC_INTERVAL:-1h}
      # Observability
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    restart: unless-stopped
    networks:
      - shared_net

  # Vue 3 admin dashboard (static SPA served by nginx). The browser talks to the
  # admin API directly — set the API base URL on the dashboard's Connection page.
  ui:
    image: aaron850130/sendmemes-ui:latest
    container_name: sendmemes-ui
    ports:
      - "8091:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - shared_net

networks:
  shared_net:
    name: shared_net
    external: true
