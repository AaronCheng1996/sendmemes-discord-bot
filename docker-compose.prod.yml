# Host deployment for sendmemes-discord-bot.
#
# Pulls the image published by .github/workflows/docker-image.yml and connects
# to existing shared infrastructure (PostgreSQL) over the external `shared_net`
# network — this file does NOT run its own database.
#
# Prerequisites on the host:
#   - `shared_net` network exists:  docker network create shared_net
#   - a PostgreSQL service is reachable as `postgres:5432` on that network
#   - the target database (SENDMEMES_POSTGRES_DB, default `sendmemes`) already exists
#     (the app auto-creates its TABLES via the migrate build tag, but not the
#      database itself)
#   - a `.env` file next to this compose supplies the values below
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: aaron850130/sendmemes-discord-bot:latest
    container_name: sendmemes-discord-bot
    ports:
      - "8090:8080"
    environment:
      # App
      SENDMEMES_APP_NAME: sendmemes-discord-bot
      SENDMEMES_APP_VERSION: "1.0.0"
      # HTTP
      SENDMEMES_HTTP_PORT: "8080"
      SENDMEMES_HTTP_USE_PREFORK_MODE: "false"
      SENDMEMES_HTTP_PUBLIC_URL: ${SENDMEMES_HTTP_PUBLIC_URL:-http://localhost:8090}
      # Logger
      SENDMEMES_LOG_LEVEL: ${SENDMEMES_LOG_LEVEL:-info}
      # Database (shared postgres on shared_net).
      # POSTGRES_USER / POSTGRES_PASSWORD stay unprefixed: they are the shared
      # cluster credentials, reused across every app on this host.
      SENDMEMES_PG_POOL_MAX: ${SENDMEMES_PG_POOL_MAX:-2}
      SENDMEMES_PG_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${SENDMEMES_POSTGRES_DB:-sendmemes}?sslmode=disable
      # Admin API / UI sign-in
      SENDMEMES_ADMIN_API_KEY: ${SENDMEMES_ADMIN_API_KEY}
      # Discord
      SENDMEMES_DISCORD_TOKEN: ${SENDMEMES_DISCORD_TOKEN}
      SENDMEMES_DISCORD_APPLICATION_ID: ${SENDMEMES_DISCORD_APPLICATION_ID}
      SENDMEMES_DISCORD_GUILD_ID: ${SENDMEMES_DISCORD_GUILD_ID}
      SENDMEMES_DISCORD_CHANNEL_ID: ${SENDMEMES_DISCORD_CHANNEL_ID}
      SENDMEMES_DISCORD_NOTIFY_CHANNEL_ID: ${SENDMEMES_DISCORD_NOTIFY_CHANNEL_ID}
      SENDMEMES_DISCORD_SEND_INTERVAL: ${SENDMEMES_DISCORD_SEND_INTERVAL:-6h}
      SENDMEMES_DISCORD_SEND_HISTORY_SIZE: ${SENDMEMES_DISCORD_SEND_HISTORY_SIZE:-10}
      SENDMEMES_DISCORD_VERBOSE_LOG: ${SENDMEMES_DISCORD_VERBOSE_LOG:-true}
      SENDMEMES_ALBUM_DEFAULT_SEND_MODE: ${SENDMEMES_ALBUM_DEFAULT_SEND_MODE:-Random}
      # pCloud
      SENDMEMES_PCLOUD_ACCESS_TOKEN: ${SENDMEMES_PCLOUD_ACCESS_TOKEN}
      SENDMEMES_PCLOUD_TOKEN_TYPE: ${SENDMEMES_PCLOUD_TOKEN_TYPE:-session}
      SENDMEMES_PCLOUD_USERNAME: ${SENDMEMES_PCLOUD_USERNAME}
      SENDMEMES_PCLOUD_PASSWORD: ${SENDMEMES_PCLOUD_PASSWORD}
      SENDMEMES_CLOUD_MAIN_FOLDER_ID: ${SENDMEMES_CLOUD_MAIN_FOLDER_ID}
      SENDMEMES_PCLOUD_API_ENDPOINT: ${SENDMEMES_PCLOUD_API_ENDPOINT:-https://api.pcloud.com}
      SENDMEMES_PCLOUD_SYNC_INTERVAL: ${SENDMEMES_PCLOUD_SYNC_INTERVAL:-1h}
      # Observability
      SENDMEMES_METRICS_ENABLED: ${SENDMEMES_METRICS_ENABLED:-true}
      SENDMEMES_SWAGGER_ENABLED: ${SENDMEMES_SWAGGER_ENABLED:-false}
    restart: unless-stopped
    networks:
      - shared_net

  # Vue 3 admin dashboard (static SPA served by nginx). The browser talks to the
  # admin API directly — set the API base URL on the dashboard's Connection page.
  ui:
    image: aaron850130/sendmemes-ui:latest
    container_name: sendmemes-ui
    ports:
      - "8091:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - shared_net

networks:
  shared_net:
    name: shared_net
    external: true
