# The db service is the official postgres image: its keys must stay the standard
# POSTGRES_* names the image reads at init. Only the interpolated values point at
# the SENDMEMES_-prefixed vars now defined in .env.
x-db-environment: &x-db-environment
  POSTGRES_SSL_MODE: "disable"
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "sendmemes"
  POSTGRES_PASSWORD: "${SENDMEMES_POSTGRES_PASSWORD}" # set in .env
  POSTGRES_USER: "${SENDMEMES_POSTGRES_USER}" # set in .env

x-backend-app-environment: &x-backend-app-environment
  GOMAXPROCS: "1"
  # App
  SENDMEMES_APP_NAME: "sendmemes-discord-bot"
  SENDMEMES_APP_VERSION: "1.0.0"
  # HTTP settings
  SENDMEMES_HTTP_PORT: "8080"
  SENDMEMES_HTTP_USE_PREFORK_MODE: "false"
  SENDMEMES_HTTP_PUBLIC_URL: "${SENDMEMES_HTTP_PUBLIC_URL:-http://localhost:8080}"
  # Logger
  SENDMEMES_LOG_LEVEL: "debug"
  # PG
  SENDMEMES_PG_POOL_MAX: "2"
  SENDMEMES_PG_URL: "postgres://${SENDMEMES_POSTGRES_USER}:${SENDMEMES_POSTGRES_PASSWORD}@db:5432/sendmemes?sslmode=disable"
  # Admin
  SENDMEMES_ADMIN_API_KEY: "${SENDMEMES_ADMIN_API_KEY}"
  # Discord
  SENDMEMES_DISCORD_TOKEN: "${SENDMEMES_DISCORD_TOKEN}"
  SENDMEMES_DISCORD_APPLICATION_ID: "${SENDMEMES_DISCORD_APPLICATION_ID}"
  SENDMEMES_DISCORD_GUILD_ID: "${SENDMEMES_DISCORD_GUILD_ID}"
  SENDMEMES_DISCORD_CHANNEL_ID: "${SENDMEMES_DISCORD_CHANNEL_ID}"
  SENDMEMES_DISCORD_NOTIFY_CHANNEL_ID: "${SENDMEMES_DISCORD_NOTIFY_CHANNEL_ID}"
  SENDMEMES_DISCORD_SEND_INTERVAL: "${SENDMEMES_DISCORD_SEND_INTERVAL:-6h}"
  SENDMEMES_DISCORD_SEND_HISTORY_SIZE: "${SENDMEMES_DISCORD_SEND_HISTORY_SIZE:-10}"
  SENDMEMES_DISCORD_VERBOSE_LOG: "${SENDMEMES_DISCORD_VERBOSE_LOG:-true}"
  SENDMEMES_ALBUM_DEFAULT_SEND_MODE: "${SENDMEMES_ALBUM_DEFAULT_SEND_MODE:-Random}"
  # pCloud
  SENDMEMES_PCLOUD_ACCESS_TOKEN: "${SENDMEMES_PCLOUD_ACCESS_TOKEN}"
  SENDMEMES_PCLOUD_TOKEN_TYPE: "${SENDMEMES_PCLOUD_TOKEN_TYPE:-session}"
  SENDMEMES_PCLOUD_USERNAME: "${SENDMEMES_PCLOUD_USERNAME}"
  SENDMEMES_PCLOUD_PASSWORD: "${SENDMEMES_PCLOUD_PASSWORD}"
  SENDMEMES_CLOUD_MAIN_FOLDER_ID: "${SENDMEMES_CLOUD_MAIN_FOLDER_ID}"
  SENDMEMES_PCLOUD_API_ENDPOINT: "${SENDMEMES_PCLOUD_API_ENDPOINT:-https://api.pcloud.com}"
  SENDMEMES_PCLOUD_SYNC_INTERVAL: "${SENDMEMES_PCLOUD_SYNC_INTERVAL:-1h}"
  # Metrics
  SENDMEMES_METRICS_ENABLED: "true"
  # Swagger
  SENDMEMES_SWAGGER_ENABLED: "true"


services:
  db:
    container_name: db
    image: postgres:15-alpine
    environment:
      <<: *x-db-environment
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      app_network:
        aliases:
          - db.lvh.me

  app:
    container_name: app
    platform: linux/amd64
    pid: "host"
    build:
      context: .
    environment:
      <<: *x-backend-app-environment
    ports:
      - "8080:8080"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: '2Gb'
        reservations:
          cpus: '0.60'
          memory: '1Gb'
    networks:
      app_network:
        aliases:
          - app.lvh.me

  nginx:
    container_name: nginx
    image: nginx:1.31.0-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      app_network:
        aliases:
          - nginx.lvh.me


networks:
  app_network:
    external: false


volumes:
  db_data:
